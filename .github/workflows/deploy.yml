name: Production Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push cukaivault image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Build and push OCR image
        uses: docker/build-push-action@v5
        with:
          context: ./ocr
          file: ./ocr/Dockerfile.ocr
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ocr:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ocr:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://cukaivault.my

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Production Server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          APP_DIR: ${{ secrets.APP_DIR }}   # e.g. /var/www/cukaivault
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh $SERVER_USER@$SERVER_HOST <<ENDSSH
            set -e

            echo "🚀 Starting CukaiVault Deployment..."
            cd ${APP_DIR:-/var/www/cukaivault}

            # Pull latest code
            echo "📥 Pulling latest code..."
            git pull origin main

            # Update environment variables from GitHub Secrets
            echo "🔐 Updating environment variables..."
            sed -i 's|^GEMINI_API_KEY=.*|GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}|' .env.production
            sed -i 's|^GOOGLE_CLIENT_ID=.*|GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}|' .env.production
            sed -i 's|^GOOGLE_CLIENT_SECRET=.*|GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}|' .env.production
            sed -i 's|^AUTH_SECRET=.*|AUTH_SECRET=${{ secrets.AUTH_SECRET }}|' .env.production

            # Backup SQLite DB before deployment
            echo "💾 Backing up database..."
            mkdir -p backups
            if [ -f "/var/lib/docker/volumes/cukaivault_cukaivault_db/_data/prod.db" ]; then
              TIMESTAMP=\$(date +%Y%m%d_%H%M%S)
              cp /var/lib/docker/volumes/cukaivault_cukaivault_db/_data/prod.db \
                 backups/prod.db.\$TIMESTAMP
              # Keep only last 5 backups
              ls -t backups/prod.db.* 2>/dev/null | tail -n +6 | xargs -r rm -f
            fi

            # Log in to GitHub Container Registry
            echo "🔐 Logging into GitHub Container Registry..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull pre-built images (MUCH FASTER than building)
            echo "📦 Pulling pre-built images...":sha-\${IMAGE_TAG}
            docker pull ghcr.io/${{ github.repository }}-ocr:sha-\${IMAGE_TAG}

            # Tag images for docker-compose
            docker tag ghcr.io/${{ github.repository }}:sha-\${IMAGE_TAG} cukaivault-cukaivault:latest
            docker tag ghcr.io/${{ github.repository }}-ocr:sha-
            docker tag ghcr.io/${{ github.repository }}/cukaivault:main-\${IMAGE_TAG} cukaivault-cukaivault:latest
            docker tag ghcr.io/${{ github.repository }}/cukaivault-ocr:\${IMAGE_TAG} cukaivault-cukaivault-ocr:latest
            
            # Start containers (no build, just use pre-built images)
            echo "🐳 Starting containers..."
            docker compose up -d --no-build --remove-orphans

            # Wait for containers to be healthy
            echo "⏳ Waiting for containers..."
            sleep 15
            docker compose ps

            # Clean up old images (keep some for rollback)
            docker image prune -af --filter "until=24h"

            echo "✅ Deployment completed"
          ENDSSH

      - name: Health Check
        run: |
          echo "⏳ Waiting for app to start..."
          sleep 10

          HEALTH_URL="https://cukaivault.my"
          echo "🔍 Checking health at: $HEALTH_URL"

          for i in 1 2 3; do
            response=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" 2>/dev/null || echo "000")
            if [ "$response" = "200" ]; then
              echo "✅ Health check PASSED (HTTP $response)"
              break
            fi
            echo "⚠️ Attempt $i: HTTP $response — retrying in 10s..."
            sleep 10
          done

          if [ "$response" != "200" ]; then
            echo "❌ Health check FAILED after 3 attempts (HTTP $response)"
            exit 1
          fi

      - name: Deployment Summary
        if: always()
        run: |
          echo "=================================================="
          echo "🧾 CUKAIVAULT DEPLOYMENT"
          echo "=================================================="
          echo "Status:      ${{ job.status }}"
          echo "Branch:      main"
          echo "Commit:      ${{ github.sha }}"
          echo "Deployed by: ${{ github.actor }}"
          echo "Timestamp:   $(date)"
          echo "=================================================="

          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployment successful!"
            echo "🌐 https://cukaivault.my"
          else
            echo "❌ Deployment failed! Check logs above."
          fi
